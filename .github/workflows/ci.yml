name: CI

on:
  push:
    branches:
      - master
      - main
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: PHP ${{ matrix.php }} — ${{ matrix.deps }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php:
          - '8.3'
          - '8.4'
        deps:
          - lowest
          - highest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          tools: composer
        env:
          COMPOSER_TOKEN: ${{ secrets.COMPOSER_TOKEN }}

      - name: Install dependencies (highest)
        if: matrix.deps == 'highest'
        run: composer update --prefer-dist --no-interaction --no-progress

      - name: Install dependencies (lowest)
        if: matrix.deps == 'lowest'
        run: composer update --prefer-dist --no-interaction --no-progress --prefer-lowest --prefer-stable

      - name: Cache Composer cache
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache/files
          key: composer-${{ matrix.php }}-${{ matrix.deps }}-${{ hashFiles('composer.json', 'composer.lock') }}
          restore-keys: |
            composer-${{ matrix.php }}-${{ matrix.deps }}-
            composer-${{ matrix.php }}-

      - name: Run PHPUnit
        run: composer test

      - name: Run PHPStan
        run: composer phpstan

      - name: Run ECS (dry-run)
        run: composer ecs

  rector:
    name: Rector dry-run
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: none
          tools: composer
        env:
          COMPOSER_TOKEN: ${{ secrets.COMPOSER_TOKEN }}

      - name: Install dependencies
        run: composer update --prefer-dist --no-interaction --no-progress

      - name: Run Rector dry-run
        run: composer rector:dry